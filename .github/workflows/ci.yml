name: Build CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Verify
    runs-on: windows-latest          # Required: System.Media only works on Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'    # dotnet CLI can build net48 on windows-latest

      - name: Restore NuGet packages
        run: dotnet restore CyberBot.csproj

      - name: Build (Release)
        run: |
          dotnet build CyberBot.csproj --configuration Release
          Write-Host "Build finished. Checking bin directory..."
          Get-ChildItem -Path bin -Recurse | Select-Object FullName

      - name: Confirm build artifact exists
        run: |
          # We check net8.0-windows specifically
          $targetPath = "bin/Release/net8.0-windows"
          if (Test-Path $targetPath) {
            $exePath = Join-Path $targetPath "CyberBot.exe"
            $dllPath = Join-Path $targetPath "CyberBot.dll"
            
            if (Test-Path $exePath) {
              Write-Host "✅ CyberBot.exe found at $exePath"
            } elseif (Test-Path $dllPath) {
              Write-Host "✅ CyberBot.dll found at $dllPath"
            } else {
              Write-Error "❌ Could not find CyberBot.exe or CyberBot.dll in $targetPath"
              exit 1
            }
          } else {
            Write-Error "❌ Target directory $targetPath does not exist."
            exit 1
          }
        shell: pwsh
